<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .sidebar {
      min-height: calc(100vh - 56px);
      background-color: #f8f9fa;
      border-right: 1px solid #dee2e6;
    }
    .sidebar .nav-link {
      color: #333;
      padding: 0.5rem 1rem;
    }
    .sidebar .nav-link.active {
      background-color: #0d6efd;
      color: white;
      font-weight: 500;
    }
    .users-table th {
      background-color: #f8f9fa;
      font-weight: 600;
    }
    .form-center {
      max-width: 500px;
      margin: 0 auto;
    }
    .form-label {
      font-weight: bold;
      text-align: center;
      display: block;
      width: 100%;
    }
    .loading {
      text-align: center;
      padding: 20px;
      color: #6c757d;
    }
  </style>
</head>
<body>
<!-- Top Black Bar -->
<nav class="navbar navbar-dark bg-dark">
  <div class="container-fluid">
        <span class="navbar-text">
            <strong th:text="${#authentication.name}">admin@mail.com</strong> with roles:
            <span th:each="role, stat : ${#authentication.authorities}"
                  th:text="${role.authority.replace('ROLE_', '')} + (not ${stat.last} ? ' ' : '')"></span>
        </span>
    <form th:action="@{/logout}" method="post" style="display: inline;">
      <button type="submit" class="btn btn-secondary btn-sm">Logout</button>
    </form>
  </div>
</nav>

<div class="container-fluid">
  <div class="row">
    <!-- Sidebar -->
    <div class="col-md-2 p-0 sidebar">
      <div class="d-flex flex-column p-3">
        <ul class="nav nav-pills flex-column">
          <li class="nav-item">
            <a class="nav-link active" href="#">
              Admin
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" th:href="@{/user}">
              User
            </a>
          </li>
        </ul>
      </div>
    </div>

    <!-- Main Content -->
    <main class="col-md-10 ms-sm-auto px-4 py-4">
      <!-- Page Header -->
      <div class="d-flex justify-content-between align-items-center border-bottom pb-2 mb-4">
        <h1 class="h2 fw-bold">Admin Panel</h1>
      </div>

      <!-- Tabs -->
      <ul class="nav nav-tabs mb-4">
        <li class="nav-item">
          <a class="nav-link active" href="#usersTable" data-bs-toggle="tab">Users table</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#" onclick="showAddModal()">New User</a>
        </li>
      </ul>

      <!-- Tab Content -->
      <div class="tab-content">
        <div class="tab-pane fade show active" id="usersTable">
          <h4 class="mb-3">All users</h4>
          <div class="loading" id="loadingUsers">Loading users...</div>

          <!-- Users Table -->
          <div class="table-responsive" id="usersTableContainer" style="display: none;">
            <table class="table table-striped table-hover users-table">
              <thead>
              <tr>
                <th>ID</th>
                <th>First Name</th>
                <th>Last Name</th>
                <th>Age</th>
                <th>Email</th>
                <th>Role</th>
                <th>Edit</th>
                <th>Delete</th>
              </tr>
              </thead>
              <tbody id="usersTableBody">
              <!-- Users will be loaded by JavaScript -->
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>


      <div class="modal-body">
        <div class="form-center">
          <div class="mb-3">
            <label class="form-label">First name</label>
            <div class="form-control border" id="deleteUserFirstName" style="background-color: #f8f9fa;"></div>
          </div>

          <div class="mb-3">
            <label class="form-label">Last name</label>
            <div class="form-control border" id="deleteUserLastName" style="background-color: #f8f9fa;"></div>
          </div>

          <div class="mb-3">
            <label class="form-label">Age</label>
            <div class="form-control border" id="deleteUserAge" style="background-color: #f8f9fa;"></div>
          </div>

          <div class="mb-3">
            <label class="form-label">Email</label>
            <div class="form-control border" id="deleteUserEmail" style="background-color: #f8f9fa;"></div>
          </div>

          <div class="mb-3">
            <label class="form-label">Role</label>
            <div class="form-control border" id="deleteUserRole" style="background-color: #f8f9fa;"></div>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
        <button type="button" class="btn btn-danger" onclick="confirmDelete()">Delete</button>
      </div>
    </div>
  </div>
</div>

<!-- Edit User Modal -->
<div class="modal fade" id="editModal" tabindex="-1" aria-labelledby="editModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="editModalLabel">Edit User</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <form id="editForm">
          <input type="hidden" id="editUserId">

          <div class="mb-3">
            <label class="form-label">First name</label>
            <input type="text" class="form-control" id="editFirstName" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Last name</label>
            <input type="text" class="form-control" id="editLastName" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Age</label>
            <input type="number" class="form-control" id="editAge" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" id="editEmail" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" class="form-control" id="editPassword"
                   placeholder="Leave empty to keep current">
          </div>

          <div class="mb-3">
            <label class="form-label">Roles</label>
            <div class="form-check">
              <input type="checkbox" class="form-check-input" id="editRoleUser" value="ROLE_USER">
              <label class="form-check-label">USER</label>
            </div>
            <div class="form-check">
              <input type="checkbox" class="form-check-input" id="editRoleAdmin" value="ROLE_ADMIN">
              <label class="form-check-label">ADMIN</label>
            </div>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-success" onclick="updateUser()">Update User</button>
      </div>
    </div>
  </div>
</div>

<!-- Add User Modal -->
<div class="modal fade" id="addModal" tabindex="-1" aria-labelledby="addModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="addModalLabel">Add New User</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <form id="addForm">
          <div class="mb-3">
            <label class="form-label">First name</label>
            <input type="text" class="form-control" id="addFirstName" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Last name</label>
            <input type="text" class="form-control" id="addLastName" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Age</label>
            <input type="number" class="form-control" id="addAge" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" id="addEmail" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" class="form-control" id="addPassword" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Roles</label>
            <div class="form-check">
              <input type="checkbox" class="form-check-input" id="addRoleUser" value="ROLE_USER" checked>
              <label class="form-check-label">USER</label>
            </div>
            <div class="form-check">
              <input type="checkbox" class="form-check-input" id="addRoleAdmin" value="ROLE_ADMIN">
              <label class="form-check-label">ADMIN</label>
            </div>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-success" onclick="createUser()">Create User</button>
      </div>
    </div>
  </div>
</div>

<!-- Bootstrap & Popper -->
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.min.js"></script>

<!-- jQuery -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<script>
  // Глобальные переменные
  let users = [];

  // Загрузка при старте
  $(document).ready(function() {
    loadUsers();
  });

  // Загрузка пользователей
  async function loadUsers() {
    try {
      $('#loadingUsers').show();
      $('#usersTableContainer').hide();

      const response = await fetch('/api/admin/users');
      if (response.ok) {
        users = await response.json();
        renderUsersTable();
      } else {
        alert('Error loading users');
      }
    } catch (error) {
      console.error('Error:', error);
      alert('Error loading users');
    }
  }

  // Отображение таблицы пользователей
  function renderUsersTable() {
    const tbody = $('#usersTableBody');
    tbody.empty();

    users.forEach(user => {
      const roles = user.roles.map(role => role.name.replace('ROLE_', '')).join(' ');

      const row = `
                <tr>
                    <td>${user.id}</td>
                    <td>${user.firstName}</td>
                    <td>${user.lastName}</td>
                    <td>${user.age}</td>
                    <td>${user.email}</td>
                    <td>${roles}</td>
                    <td>
                        <button class="btn btn-info btn-sm" onclick="showEditModal(${user.id})">
                            Edit
                        </button>
                    </td>
                    <td>
    <button class="btn btn-danger btn-sm" onclick="deleteUser(${user.id})">
        Delete
    </button>
</td>
                </tr>
            `;
      tbody.append(row);
    });

    $('#loadingUsers').hide();
    $('#usersTableContainer').show();
  }

  // Показать модальное окно добавления
  function showAddModal() {
    $('#addFirstName').val('');
    $('#addLastName').val('');
    $('#addAge').val('');
    $('#addEmail').val('');
    $('#addPassword').val('');
    $('#addRoleUser').prop('checked', true);
    $('#addRoleAdmin').prop('checked', false);
    $('#addModal').modal('show');
  }

  // Создание нового пользователя
  async function createUser() {
    const roles = [];
    if ($('#addRoleUser').is(':checked')) roles.push('ROLE_USER');
    if ($('#addRoleAdmin').is(':checked')) roles.push('ROLE_ADMIN');

    const userData = {
      firstName: $('#addFirstName').val(),
      lastName: $('#addLastName').val(),
      age: parseInt($('#addAge').val()),
      email: $('#addEmail').val(),
      password: $('#addPassword').val(),
      roles: roles.map(roleName => ({ name: roleName }))
    };

    try {
      const response = await fetch('/api/admin/users', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(userData)
      });

      if (response.ok) {
        $('#addModal').modal('hide');
        await loadUsers();
      } else {
        alert('Error creating user');
      }
    } catch (error) {
      console.error('Error:', error);
      alert('Error creating user');
    }
  }

  // Показать модальное окно редактирования
  async function showEditModal(userId) {
    try {
      const response = await fetch(`/api/admin/users/${userId}`);
      if (response.ok) {
        const user = await response.json();

        $('#editUserId').val(user.id);
        $('#editFirstName').val(user.firstName);
        $('#editLastName').val(user.lastName);
        $('#editAge').val(user.age);
        $('#editEmail').val(user.email);
        $('#editPassword').val('');

        // Отмечаем роли пользователя
        $('#editRoleUser').prop('checked', user.roles.some(r => r.name === 'ROLE_USER'));
        $('#editRoleAdmin').prop('checked', user.roles.some(r => r.name === 'ROLE_ADMIN'));

        $('#editModal').modal('show');
      } else {
        alert('Error loading user data');
      }
    } catch (error) {
      console.error('Error:', error);
      alert('Error loading user data');
    }
  }

  // Обновление пользователя
  async function updateUser() {
    const userId = $('#editUserId').val();

    const userData = {
      id: userId,
      firstName: $('#editFirstName').val(),
      lastName: $('#editLastName').val(),
      age: parseInt($('#editAge').val()),
      email: $('#editEmail').val()
    };

    const password = $('#editPassword').val();
    if (password && password.trim() !== '') {
      userData.password = password;
    }

    try {
      const response = await fetch(`/api/admin/users/${userId}`, {
        method: 'PUT',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(userData)
      });

      if (response.ok) {
        $('#editModal').modal('hide');
        await loadUsers();
      } else {
        alert('Error updating user');
      }
    } catch (error) {
      console.error('Error:', error);
      alert('Error updating user');
    }
  }

  // Удаление пользователя без подтверждения
  async function deleteUser(userId) {
    try {
      const response = await fetch(`/api/admin/users/${userId}`, {
        method: 'DELETE'
      });

      if (response.ok) {
        await loadUsers(); // перезагружаем таблицу
      } else {
        alert('Error deleting user');
      }
    } catch (error) {
      console.error('Error:', error);
      alert('Error deleting user');
    }
  }



</script>
</body>
</html>
