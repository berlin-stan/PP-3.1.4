<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="${user.id} != null ? 'Edit User' : 'Add New User'">User Form</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .sidebar {
      min-height: calc(100vh - 56px);
      background-color: #f8f9fa;
      border-right: 1px solid #dee2e6;
    }
    .sidebar .nav-link {
      color: #333;
      padding: 0.5rem 1rem;
    }
    .sidebar .nav-link.active {
      background-color: #0d6efd;
      color: white;
      font-weight: 500;
    }
    .form-control:focus {
      background-color: #fff3cd;
      border-color: #ffc107;
      box-shadow: 0 0 0 0.2rem rgba(255, 193, 7, 0.25);
    }
    .form-center {
      max-width: 500px;
      margin: 0 auto;
    }
    .form-label {
      font-weight: bold;
      text-align: center;
      display: block;
      width: 100%;
    }
  </style>
</head>
<body>
<nav class="navbar navbar-dark bg-dark">
  <div class="container-fluid">
    <span class="navbar-text">
      <strong th:text="${#authentication.name}"></strong> with roles:
      <span th:each="role, stat : ${#authentication.authorities}"
            th:text="${role.authority.replace('ROLE_', '')} + (not ${stat.last} ? ' ' : '')"></span>
    </span>
    <a th:href="@{/logout}" class="btn btn-secondary btn-sm">Logout</a>
  </div>
</nav>

<div class="container-fluid">
  <div class="row">
    <div class="col-md-2 p-0 sidebar">
      <div class="d-flex flex-column p-3">
        <ul class="nav nav-pills flex-column">
          <li class="nav-item">
            <a class="nav-link active" th:href="@{/admin}">Admin</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" th:href="@{/user}">User</a>
          </li>
        </ul>
      </div>
    </div>

    <main class="col-md-10 ms-sm-auto px-4 py-4">
      <div class="d-flex justify-content-between align-items-center border-bottom pb-2 mb-4">
        <h1 class="h2 fw-bold">Admin Panel</h1>
      </div>

      <ul class="nav nav-tabs mb-4">
        <li class="nav-item">
          <a class="nav-link" th:href="@{/admin/users}">Users table</a>
        </li>
        <li class="nav-item">
          <a class="nav-link active" href="#">
            <span th:text="${user.id} != null ? 'Edit User' : 'New User'"></span>
          </a>
        </li>
      </ul>

      <h4 class="mb-4 text-center" th:text="${user.id} != null ? 'Edit user' : 'Add new user'"></h4>

      <form th:action="@{/admin/saveUser}" method="post" class="form-center" autocomplete="off">
        <input type="hidden" name="id" th:value="${user.id}" th:if="${user.id} != null">

        <div class="mb-3">
          <label for="firstName" class="form-label">First name</label>
          <input type="text" class="form-control" id="firstName" name="firstName"
                 th:value="${user.firstName}" required autocomplete="off">
        </div>

        <div class="mb-3">
          <label for="lastName" class="form-label">Last name</label>
          <input type="text" class="form-control" id="lastName" name="lastName"
                 th:value="${user.lastName}" required autocomplete="off">
        </div>

        <div class="mb-3">
          <label for="age" class="form-label">Age</label>
          <input type="number" class="form-control" id="age" name="age"
                 th:value="${user.age}" required min="1" max="120" autocomplete="off">
        </div>

        <div class="mb-3">
          <label for="email" class="form-label">Email</label>
          <input type="email" class="form-control" id="email" name="email"
                 th:value="${user.email}" required autocomplete="off">
        </div>

        <div class="mb-3">
          <label for="password" class="form-label">Password</label>
          <input type="password" class="form-control" id="password" name="password"
                 th:placeholder="${user.id} != null ? 'Leave empty to keep current password' : 'Enter password'"
                 th:required="${user.id} == null" autocomplete="new-password">
        </div>

        <div class="mb-4">
          <label for="role" class="form-label">Role</label>
          <select class="form-select" id="role" name="roles" multiple>
            <option value="ROLE_USER" th:selected="${user.roles == null || #lists.contains(user.roles, 'ROLE_USER')}">USER</option>
            <option value="ROLE_ADMIN" th:selected="${#lists.contains(user.roles, 'ROLE_ADMIN')}">ADMIN</option>
          </select>
        </div>

        <div class="text-center">
          <button type="submit" class="btn btn-success">
            <span th:text="${user.id} != null ? 'Update User' : 'Add new user'"></span>
          </button>
        </div>
      </form>
    </main>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
