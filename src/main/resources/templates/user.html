<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .sidebar {
            min-height: calc(100vh - 56px);
            background-color: #f8f9fa;
            border-right: 1px solid #dee2e6;
        }
        .sidebar .nav-link {
            color: #333;
            padding: 0.5rem 1rem;
        }
        .sidebar .nav-link.active {
            background-color: #0d6efd;
            color: white;
            font-weight: 500;
        }
        .users-table th {
            background-color: #f8f9fa;
            font-weight: 600;
        }
        .form-center {
            max-width: 500px;
            margin: 0 auto;
        }
        .form-label {
            font-weight: bold;
            text-align: center;
            display: block;
            width: 100%;
        }
    </style>
</head>
<body>
<!-- Top Black Bar -->
<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
            <span class="navbar-text">
                <strong th:text="${#authentication.name}">admin@mail.com</strong> with roles:
                <span th:each="role, stat : ${#authentication.authorities}"
                      th:text="${role.authority.replace('ROLE_', '')} + (not ${stat.last} ? ' ' : '')"></span>
            </span>
        <a th:href="@{/logout}" class="btn btn-secondary btn-sm">
            Logout
        </a>
    </div>
</nav>

<div class="container-fluid">
    <div class="row">
        <!-- Sidebar -->
        <div class="col-md-2 p-0 sidebar">
            <div class="d-flex flex-column p-3">
                <ul class="nav nav-pills flex-column">
                    <li class="nav-item">
                        <a class="nav-link active" href="#">
                            Admin
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/user}">
                            User
                        </a>
                    </li>
                </ul>
            </div>
        </div>

        <!-- Main Content -->
        <main class="col-md-10 ms-sm-auto px-4 py-4">
            <!-- Page Header -->
            <div class="d-flex justify-content-between align-items-center border-bottom pb-2 mb-4">
                <h1 class="h2 fw-bold">Admin Panel</h1>
            </div>

            <!-- Tabs -->
            <ul class="nav nav-tabs mb-4">
                <li class="nav-item">
                    <a class="nav-link active" href="#usersTable" data-bs-toggle="tab">Users table</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/admin/addUser}">
                        New User
                    </a>
                </li>
            </ul>

            <!-- Tab Content -->
            <div class="tab-content">
                <div class="tab-pane fade show active" id="usersTable">
                    <h4 class="mb-3">All users</h4>

                    <!-- Users Table -->
                    <div class="table-responsive">
                        <table class="table table-striped table-hover users-table">
                            <thead>
                            <tr>
                                <th>ID</th>
                                <th>First Name</th>
                                <th>Last Name</th>
                                <th>Age</th>
                                <th>Email</th>
                                <th>Role</th>
                                <th>Edit</th>
                                <th>Delete</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="user : ${users}">
                                <td th:text="${user.id}"></td>
                                <td th:text="${user.firstName}"></td>
                                <td th:text="${user.lastName}"></td>
                                <td th:text="${user.age}"></td>
                                <td th:text="${user.email}"></td>
                                <td>
                                            <span th:each="role, iterStat : ${user.roles}"
                                                  th:text="${role.name.replace('ROLE_', '')} + (${iterStat.last} ? '' : ' ')">
                                            </span>
                                </td>
                                <td>
                                    <a th:href="@{'/admin/editUser?id=' + ${user.id}}"
                                       class="btn btn-info btn-sm">
                                        Edit
                                    </a>
                                </td>
                                <td>
                                    <button type="button" class="btn btn-danger btn-sm delete-btn"
                                            data-bs-toggle="modal" data-bs-target="#deleteModal"
                                            th:data-user-id="${user.id}"
                                            th:data-user-firstname="${user.firstName}"
                                            th:data-user-lastname="${user.lastName}"
                                            th:data-user-age="${user.age}"
                                            th:data-user-email="${user.email}">
                                        Delete
                                    </button>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>

<!-- Delete Confirmation Modal -->
<div class="modal fade" id="deleteModal" tabindex="-1" aria-labelledby="deleteModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="deleteModalLabel">Delete User</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div class="form-center">
                    <div class="mb-3">
                        <label class="form-label">First name</label>
                        <div class="form-control border" id="deleteUserFirstName" style="background-color: #f8f9fa;"></div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Last name</label>
                        <div class="form-control border" id="deleteUserLastName" style="background-color: #f8f9fa;"></div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Age</label>
                        <div class="form-control border" id="deleteUserAge" style="background-color: #f8f9fa;"></div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <div class="form-control border" id="deleteUserEmail" style="background-color: #f8f9fa;"></div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Role</label>
                        <div class="form-control border" id="deleteUserRole" style="background-color: #f8f9fa;"></div>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                <form id="deleteForm" method="get" th:action="@{/admin/deleteUser}">
                    <input type="hidden" name="id" id="deleteUserHiddenId">
                    <button type="submit" class="btn btn-danger">Delete</button>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- Bootstrap & Popper -->
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.min.js"></script>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const deleteModal = document.getElementById('deleteModal');

        deleteModal.addEventListener('show.bs.modal', function (event) {
            const button = event.relatedTarget;
            const userId = button.getAttribute('data-user-id');
            const userFirstName = button.getAttribute('data-user-firstname');
            const userLastName = button.getAttribute('data-user-lastname');
            const userAge = button.getAttribute('data-user-age');
            const userEmail = button.getAttribute('data-user-email');

            // Находим строку таблицы и получаем роль
            const row = button.closest('tr');
            const roleCell = row.querySelector('td:nth-child(6)'); // 6-я ячейка - Role
            const userRole = roleCell.textContent.trim();

            // Заполняем модальное окно данными
            document.getElementById('deleteUserFirstName').textContent = userFirstName;
            document.getElementById('deleteUserLastName').textContent = userLastName;
            document.getElementById('deleteUserAge').textContent = userAge;
            document.getElementById('deleteUserEmail').textContent = userEmail;
            document.getElementById('deleteUserRole').textContent = userRole;

            // Устанавливаем ID для формы удаления
            document.getElementById('deleteUserHiddenId').value = userId;
        });
    });
</script>
</body>
</html>
