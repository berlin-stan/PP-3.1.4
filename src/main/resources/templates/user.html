<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Page</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .user-container {
            max-width: 600px;
            margin: 50px auto;
            padding: 30px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }
        .user-info {
            margin: 20px 0;
            padding: 20px;
            background-color: #f8f9fa;
            border-radius: 8px;
        }
        .info-row {
            margin: 10px 0;
            padding: 10px;
            border-bottom: 1px solid #dee2e6;
        }
        .info-label {
            font-weight: bold;
            color: #495057;
        }
        .loading {
            text-align: center;
            padding: 20px;
            color: #6c757d;
        }
    </style>
</head>
<body>
<!-- Top Black Bar -->
<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <span class="navbar-text">
            <strong th:text="${#authentication.name}">user@mail.com</strong> with roles:
            <span th:each="role, stat : ${#authentication.authorities}"
                  th:text="${role.authority.replace('ROLE_', '')} + (not ${stat.last} ? ' ' : '')"></span>
        </span>
        <form th:action="@{/logout}" method="post" style="display: inline;">
            <button type="submit" class="btn btn-secondary btn-sm">Logout</button>
        </form>
    </div>
</nav>

<div class="container">
    <div class="user-container">
        <h1 class="text-center mb-4">User Information</h1>

        <div class="loading" id="loading">Loading user data...</div>

        <div class="user-info" id="userInfo" style="display: none;">
            <div class="info-row">
                <span class="info-label">ID:</span>
                <span class="float-end" id="userId"></span>
            </div>
            <div class="info-row">
                <span class="info-label">First Name:</span>
                <span class="float-end" id="userFirstName"></span>
            </div>
            <div class="info-row">
                <span class="info-label">Last Name:</span>
                <span class="float-end" id="userLastName"></span>
            </div>
            <div class="info-row">
                <span class="info-label">Age:</span>
                <span class="float-end" id="userAge"></span>
            </div>
            <div class="info-row">
                <span class="info-label">Email:</span>
                <span class="float-end" id="userEmail"></span>
            </div>
            <div class="info-row">
                <span class="info-label">Roles:</span>
                <span class="float-end" id="userRoles"></span>
            </div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    $(document).ready(function() {
        loadCurrentUser();
    });

    async function loadCurrentUser() {
        try {
            $('#loading').show();
            $('#userInfo').hide();

            const response = await fetch('/api/user/current');
            if (response.ok) {
                const user = await response.json();

                $('#userId').text(user.id);
                $('#userFirstName').text(user.firstName);
                $('#userLastName').text(user.lastName);
                $('#userAge').text(user.age);
                $('#userEmail').text(user.email);

                const roles = user.roles.map(role => role.name.replace('ROLE_', '')).join(' ');
                $('#userRoles').text(roles);

                $('#loading').hide();
                $('#userInfo').show();
            } else {
                alert('Error loading user data');
            }
        } catch (error) {
            console.error('Error:', error);
            alert('Error loading user data');
        }
    }
</script>
</body>
</html>
